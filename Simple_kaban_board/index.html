<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple_Kaban_Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Simple Kaban Board</h1>
      <div class="main-container">
        <div class="to-do">
          <h2>To Do</h2>
          <div class="column box-to" id="box-to">
            
          </div>
        </div>
        <div class="in-progress" id="box-in">
          <h2>In Porgress</h2>
          <div class="column box-in">
        
          </div>
        </div>
        <div class="done" id="box-do">
          <h2>Done</h2>
          <div class="column box-do">
           
          </div>
        </div>
      </div>
      <div class="input-box">
        <form >
          <input type="text" placeholder="Enter Your Task" />
          <button type="submit" id="submit">Add</button>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
